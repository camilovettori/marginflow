services:
  db:
    image: postgres:16
    container_name: marginflow_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marginflow
    ports:
      - "5432:5432"
    volumes:
      - marginflow_pgdata:/var/lib/postgresql/data

volumes:
  marginflow_pgdata:
  